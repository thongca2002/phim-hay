<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Phim Hay</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #111;
      color: white;
    }

    header {
      background: #e50914;
      padding: 15px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      padding: 15px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: none;
      border-radius: 5px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px;
    }

    .card {
      background: #222;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.03);
    }

    .card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }

    .card p {
      padding: 8px;
      font-size: 14px;
    }

    .video {
      margin-top: 20px;
    }

    iframe {
      width: 100%;
      height: 400px;
      border: none;
    }
  </style>
</head>

<body>

<header>🎬 Phim Hay</header>

<div class="container">

  <input type="text" id="search" placeholder="Tìm phim..." onkeyup="searchMovie()"/>

  <div class="grid" id="movieList"></div>

  <div class="video" id="videoBox"></div>

</div>

<script>
  const API_URL =eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiJlMjFhODVlNjM0M2Q0OTVmN2U4MmVkZmZjM2YyMWQ2NyIsIm5iZiI6MTc3ODc2ODExMi4zNzc5OTk4LCJzdWIiOiI2YTA1ZDhmMDE3MDZkMjkxZjA1ODA1NWYiLCJzY29wZXMiOlsiYXBpX3JlYWQiXSwidmVyc2lvbiI6MX0.ZD0DXp2qLkYSTQD91KhRMAV19CS6ScNaH--IAodQeM0;

  let movies = [];

  async function loadMovies() {
    try {
      const res = await fetch(API_URL);
      movies = await res.json();
      renderMovies(movies);
    } catch (err) {
      document.getElementById("movieList").innerHTML =
        "<p>Lỗi load API</p>";
      console.log(err);
    }
  }

  function renderMovies(data) {
    const list = document.getElementById("movieList");
    list.innerHTML = "";

    data.forEach(movie => {
      list.innerHTML += `
        <div class="card" onclick="playMovie('${movie.url}')">
          <img src="${movie.image}" />
          <p>${movie.title}</p>
        </div>
      `;
    });
  }

  function playMovie(url) {
    document.getElementById("videoBox").innerHTML = `
      <iframe src="${url}" allowfullscreen></iframe>
    `;
  }

  function searchMovie() {
    const key = document.getElementById("search").value.toLowerCase();
    const filtered = movies.filter(m =>
      m.title.toLowerCase().includes(key)
    );
    renderMovies(filtered);
  }

  loadMovies();
</script>

</body>
</html>
